<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hifz Journey</title>
<meta name="description" content="Track, plan, and stay consistent with your Qur'an memorization journey.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hifz Journey">
<meta name="theme-color" content="#0B1622">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1622;
    --surface:#132238;
    --surface-2:#1B2E48;
    --gold:#CBA135;
    --gold-soft:#E8C874;
    --sage:#6E9B7C;
    --amber:#C97B4A;
    --text:#EDE6D6;
    --text-muted:#8FA0B3;
    --border:rgba(237,230,214,0.09);
  }
  html{
    background:var(--bg);
    overscroll-behavior:none;
    height:100%;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  html::-webkit-scrollbar{
    display:none;
    width:0;
    height:0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100%;
    overscroll-behavior:none;
    background:radial-gradient(ellipse at top, #101F33 0%, var(--bg) 55%);
    background-attachment:fixed;
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    letter-spacing:0.1px;
    padding:0 0 60px 0;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  body::-webkit-scrollbar{
    display:none;
    width:0;
    height:0;
  }
  .wrap{max-width:920px;margin:0 auto;padding:32px 20px;}

  /* header */
  header{text-align:center;margin-bottom:24px;padding-top:8px;}
  .logo-mark{width:64px;height:64px;border-radius:16px;margin-bottom:10px;box-shadow:0 4px 18px rgba(203,161,53,0.25);}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold-soft);
    opacity:0.8;
  }
  h1{
    font-family:'Amiri', serif;
    font-size:42px;
    font-weight:700;
    margin:6px 0 4px;
    color:var(--text);
    letter-spacing:0.5px;
  }
  .arabic-sub{
    font-family:'Amiri', serif;
    font-size:28px;
    font-weight:700;
    color:var(--gold-soft);
    direction:rtl;
    margin-bottom:2px;
  }
  .sub{color:var(--text-muted);font-size:14px;}

  /* stat cards */
  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin:28px 0;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px 16px;
    text-align:center;
  }
  .stat-num{
    font-family:'JetBrains Mono', monospace;
    font-size:28px;
    font-weight:700;
    color:var(--gold);
  }
  .stat-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--text-muted);
    margin-top:4px;
  }
  .stat-card.streak .stat-num{color:var(--sage);}

  /* progress bar */
  .progress-outer{
    background:var(--surface-2);
    border-radius:20px;
    height:12px;
    overflow:hidden;
    margin:6px 0 30px;
    border:1px solid var(--border);
  }
  .progress-inner{
    height:100%;
    background:linear-gradient(90deg, var(--sage), var(--gold));
    border-radius:20px;
    transition:width .6s ease;
  }
  .progress-caption{
    display:flex;justify-content:space-between;
    font-size:12px;color:var(--text-muted);margin-bottom:4px;
  }

  /* today panel */
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;
  }
  .panel h2{
    font-family:'Amiri', serif;
    font-size:20px;
    margin:0 0 12px;
    color:var(--gold-soft);
    display:flex;align-items:center;gap:8px;
  }
  .checkin-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  button{
    font-family:'Work Sans', sans-serif;
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    font-size:13px;
    font-weight:600;
    transition:transform .15s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.97);}
  .btn-gold{background:var(--gold);color:#1a1206;}
  .btn-gold:hover{background:var(--gold-soft);}
  .btn-gold:disabled{opacity:0.45;cursor:default;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
  .btn-ghost:hover{color:var(--text);border-color:var(--gold-soft);}
  .checkin-note{font-size:12px;color:var(--text-muted);}

  .review-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .review-item{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--surface-2);
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
  }
  .review-item .en{color:var(--text);}
  .review-item .ar{font-family:'Amiri',serif;color:var(--gold-soft);font-size:15px;direction:rtl;}
  .review-item button{padding:6px 12px;font-size:11px;}
  .empty-note{color:var(--text-muted);font-size:13px;font-style:italic;}

  /* phase sections */
  .phase{margin-bottom:38px;}
  .phase-head{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px dashed var(--border);
    padding-bottom:10px;margin-bottom:16px;
  }
  .phase-title{
    font-family:'Amiri', serif;
    font-size:24px;
    font-weight:700;
    color:var(--text);
    direction:rtl;
    text-align:right;
    line-height:1.6;
    letter-spacing:0.2px;
  }
  .phase-pct{
    font-size:12px;
    color:var(--sage);
    font-family:'JetBrains Mono',monospace;
    direction:ltr;
    text-align:left;
    letter-spacing:0.3px;
  }

  .bead-grid{
    display:flex;flex-wrap:wrap;gap:9px;
  }
  .bead{
    width:36px;height:36px;border-radius:50%;
    border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;color:var(--text-muted);
    cursor:pointer;position:relative;
    background:var(--surface);
    transition:all .2s ease;
  }
  .bead:hover{border-color:var(--gold-soft);color:var(--text);}
  .bead.memorized{
    background:var(--gold);border-color:var(--gold);color:#1a1206;font-weight:700;
    box-shadow:0 0 8px rgba(203,161,53,0.32);
  }
  .bead.memorizing{
    border-color:var(--sage);color:var(--sage);
    box-shadow:0 0 0 3px rgba(110,155,122,0.12);
  }
  .bead.current::before{
    content:'';position:absolute;inset:-5px;border-radius:50%;
    border:1.5px solid var(--sage);opacity:0.7;
  }
  .bead.review-due::after{
    content:'';position:absolute;top:-3px;right:-3px;width:9px;height:9px;
    border-radius:50%;background:var(--amber);border:2px solid var(--bg);
  }

  /* modal */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(5,10,18,0.72);
    display:none;align-items:center;justify-content:center;z-index:50;
    padding:20px;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;max-width:380px;width:100%;padding:24px;
  }
  .modal-ar{font-family:'Amiri',serif;font-size:30px;color:var(--gold-soft);direction:rtl;text-align:left;margin:0 44px 2px 0;}
  .modal-en{font-size:16px;color:var(--text);margin:0 44px 2px 0;text-align:left;}
  .modal-meta{font-size:12px;color:var(--text-muted);margin-bottom:18px;font-family:'JetBrains Mono',monospace;}
  .status-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .status-opt{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    cursor:pointer;font-size:13px;color:var(--text-muted);
  }
  .status-opt.active{border-color:var(--gold);color:var(--text);background:rgba(203,161,53,0.08);}
  .status-opt .dot{width:10px;height:10px;border-radius:50%;border:2px solid currentColor;}
  .modal-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .modal-close{color:var(--text-muted);background:none;border:none;font-size:20px;position:absolute;top:16px;right:18px;cursor:pointer;}
  .modal{position:relative;}
  .last-reviewed{font-size:11px;color:var(--text-muted);}

  .footer-actions{text-align:center;margin-top:36px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .footer-actions button{font-size:11px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#1a1206;padding:10px 20px;border-radius:10px;
    font-size:13px;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;z-index:60;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  @media (max-width:520px){
    .stats{grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .stat-num{font-size:20px;}
    h1{font-size:32px;}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div style="text-align:center;color:var(--text-muted);padding:60px 0;">Loading your journey…</div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  // ---------- Surah data (number, english, arabic, ayah count) ----------
  const SURAHS = [
    [1,"Al-Fatihah","الفاتحة",7],[2,"Al-Baqarah","البقرة",286],[3,"Aal-E-Imran","آل عمران",200],
    [4,"An-Nisa","النساء",176],[5,"Al-Ma'idah","المائدة",120],[6,"Al-An'am","الأنعام",165],
    [7,"Al-A'raf","الأعراف",206],[8,"Al-Anfal","الأنفال",75],[9,"At-Tawbah","التوبة",129],
    [10,"Yunus","يونس",109],[11,"Hud","هود",123],[12,"Yusuf","يوسف",111],
    [13,"Ar-Ra'd","الرعد",43],[14,"Ibrahim","ابراهيم",52],[15,"Al-Hijr","الحجر",99],
    [16,"An-Nahl","النحل",128],[17,"Al-Isra","الإسراء",111],[18,"Al-Kahf","الكهف",110],
    [19,"Maryam","مريم",98],[20,"Ta-Ha","طه",135],[21,"Al-Anbiya","الأنبياء",112],
    [22,"Al-Hajj","الحج",78],[23,"Al-Mu'minun","المؤمنون",118],[24,"An-Nur","النور",64],
    [25,"Al-Furqan","الفرقان",77],[26,"Ash-Shu'ara","الشعراء",227],[27,"An-Naml","النمل",93],
    [28,"Al-Qasas","القصص",88],[29,"Al-Ankabut","العنكبوت",69],[30,"Ar-Rum","الروم",60],
    [31,"Luqman","لقمان",34],[32,"As-Sajdah","السجدة",30],[33,"Al-Ahzab","الأحزاب",73],
    [34,"Saba","سبأ",54],[35,"Fatir","فاطر",45],[36,"Ya-Sin","يس",83],
    [37,"As-Saffat","الصافات",182],[38,"Sad","ص",88],[39,"Az-Zumar","الزمر",75],
    [40,"Ghafir","غافر",85],[41,"Fussilat","فصلت",54],[42,"Ash-Shura","الشورى",53],
    [43,"Az-Zukhruf","الزخرف",89],[44,"Ad-Dukhan","الدخان",59],[45,"Al-Jathiyah","الجاثية",37],
    [46,"Al-Ahqaf","الأحقاف",35],[47,"Muhammad","محمد",38],[48,"Al-Fath","الفتح",29],
    [49,"Al-Hujurat","الحجرات",18],[50,"Qaf","ق",45],[51,"Adh-Dhariyat","الذاريات",60],
    [52,"At-Tur","الطور",49],[53,"An-Najm","النجم",62],[54,"Al-Qamar","القمر",55],
    [55,"Ar-Rahman","الرحمن",78],[56,"Al-Waqi'ah","الواقعة",96],[57,"Al-Hadid","الحديد",29],
    [58,"Al-Mujadilah","المجادلة",22],[59,"Al-Hashr","الحشر",24],[60,"Al-Mumtahanah","الممتحنة",13],
    [61,"As-Saff","الصف",14],[62,"Al-Jumu'ah","الجمعة",11],[63,"Al-Munafiqun","المنافقون",11],
    [64,"At-Taghabun","التغابن",18],[65,"At-Talaq","الطلاق",12],[66,"At-Tahrim","التحريم",12],
    [67,"Al-Mulk","الملك",30],[68,"Al-Qalam","القلم",52],[69,"Al-Haqqah","الحاقة",52],
    [70,"Al-Ma'arij","المعارج",44],[71,"Nuh","نوح",28],[72,"Al-Jinn","الجن",28],
    [73,"Al-Muzzammil","المزمل",20],[74,"Al-Muddaththir","المدثر",56],[75,"Al-Qiyamah","القيامة",40],
    [76,"Al-Insan","الإنسان",31],[77,"Al-Mursalat","المرسلات",50],[78,"An-Naba","النبأ",40],
    [79,"An-Nazi'at","النازعات",46],[80,"Abasa","عبس",42],[81,"At-Takwir","التكوير",29],
    [82,"Al-Infitar","الإنفطار",19],[83,"Al-Mutaffifin","المطففين",36],[84,"Al-Inshiqaq","الإنشقاق",25],
    [85,"Al-Buruj","البروج",22],[86,"At-Tariq","الطارق",17],[87,"Al-A'la","الأعلى",19],
    [88,"Al-Ghashiyah","الغاشية",26],[89,"Al-Fajr","الفجر",30],[90,"Al-Balad","البلد",20],
    [91,"Ash-Shams","الشمس",15],[92,"Al-Layl","الليل",21],[93,"Ad-Duha","الضحى",11],
    [94,"Ash-Sharh","الشرح",8],[95,"At-Tin","التين",8],[96,"Al-Alaq","العلق",19],
    [97,"Al-Qadr","القدر",5],[98,"Al-Bayyinah","البينة",8],[99,"Az-Zalzalah","الزلزلة",8],
    [100,"Al-Adiyat","العاديات",11],[101,"Al-Qari'ah","القارعة",11],[102,"At-Takathur","التكاثر",8],
    [103,"Al-Asr","العصر",3],[104,"Al-Humazah","الهمزة",9],[105,"Al-Fil","الفيل",5],
    [106,"Quraysh","قريش",4],[107,"Al-Ma'un","الماعون",7],[108,"Al-Kawthar","الكوثر",3],
    [109,"Al-Kafirun","الكافرون",6],[110,"An-Nasr","النصر",3],[111,"Al-Masad","المسد",5],
    [112,"Al-Ikhlas","الإخلاص",4],[113,"Al-Falaq","الفلق",5],[114,"An-Nas","الناس",6]
  ].map(([num,en,ar,ayahs])=>({num,en,ar,ayahs}));

  const byNum = {};
  SURAHS.forEach(s=>byNum[s.num]=s);

  // custom plan order: phase1 (19-114) -> phase2 (1, then 2-18)
  const PHASE1 = SURAHS.filter(s=>s.num>=19).map(s=>s.num);
  const PHASE2 = [1, ...SURAHS.filter(s=>s.num>=2 && s.num<=18).map(s=>s.num)];

  const STORAGE_KEY = 'hifz-tracker-state';
  let state = null;
  let currentModalNum = null;
  let lastKnownPct = null;
  const MILESTONES = [25, 50, 75, 100];
  function crossedMilestone(before, after){
    return MILESTONES.find(m => before < m && after >= m);
  }

  function defaultState(){
    const surahs = {};
    SURAHS.forEach(s=>{
      surahs[s.num] = {
        status: s.num===1 ? 'memorized' : 'not-started', // Al-Fatihah assumed known; toggle if not
        lastReviewed: s.num===1 ? todayStr() : null,
        memorizedDate: s.num===1 ? todayStr() : null
      };
    });
    return { surahs, checkins: {}, soundEnabled: true };
  }

  function todayStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function daysAgo(n){
    const d = new Date();
    d.setDate(d.getDate()-n);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  async function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        state = JSON.parse(raw);
        // backfill any missing surahs (safety)
        SURAHS.forEach(s=>{
          if(!state.surahs[s.num]) state.surahs[s.num] = {status:'not-started', lastReviewed:null, memorizedDate:null};
        });
        if(!state.checkins) state.checkins = {};
        if(typeof state.soundEnabled !== 'boolean') state.soundEnabled = true;
      } else {
        state = defaultState();
      }
    }catch(e){
      state = defaultState();
    }
  }

  async function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      console.error('Save failed', e);
      showToast('Could not save — try again');
    }
  }

  // ---------- sound engine (synthesized, no external files) ----------
  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playNote(ctx, freq, time, dur, gain, type){
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(gain, time + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(time); osc.stop(time + dur + 0.05);
  }
  function playSound(kind){
    if(!state.soundEnabled) return;
    const ctx = getAudioCtx();
    if(!ctx) return;
    const t = ctx.currentTime;
    if(kind === 'checkin'){
      playNote(ctx, 587.33, t, 0.16, 0.14, 'sine');      // D5
      playNote(ctx, 880.00, t + 0.08, 0.2, 0.14, 'sine'); // A5
    } else if(kind === 'review'){
      playNote(ctx, 660, t, 0.14, 0.11, 'triangle');
    } else if(kind === 'memorized'){
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
      notes.forEach((f,i)=> playNote(ctx, f, t + i*0.09, 0.32, 0.15, 'sine'));
    } else if(kind === 'milestone'){
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; // C5 E5 G5 C6 E6
      notes.forEach((f,i)=>{
        playNote(ctx, f, t + i*0.1, 0.5, 0.16, 'sine');
        playNote(ctx, f*2, t + i*0.1, 0.4, 0.045, 'sine');
      });
    }
  }

  // ---------- computations ----------

  // Starting page of each surah in the standard 604-page Madani Mushaf (King Fahd Complex layout).
  // Note: page numbers can differ slightly by print/edition — this matches the most common Uthmani Madani mushaf.
  const PAGE_START = {
    1:1,2:2,3:50,4:77,5:106,6:128,7:151,8:177,9:187,10:208,
    11:221,12:235,13:249,14:255,15:262,16:267,17:282,18:293,19:305,20:312,
    21:322,22:332,23:342,24:350,25:359,26:367,27:377,28:385,29:396,30:404,
    31:411,32:415,33:418,34:428,35:434,36:440,37:446,38:453,39:458,40:467,
    41:477,42:483,43:489,44:496,45:499,46:502,47:507,48:511,49:515,50:518,
    51:520,52:523,53:526,54:528,55:531,56:534,57:537,58:542,59:545,60:549,
    61:551,62:553,63:554,64:556,65:558,66:560,67:562,68:564,69:566,70:568,
    71:570,72:572,73:574,74:575,75:577,76:578,77:580,78:582,79:583,80:585,
    81:586,82:587,83:587,84:589,85:590,86:591,87:591,88:592,89:593,90:594,
    91:595,92:595,93:596,94:596,95:597,96:597,97:598,98:598,99:599,100:599,
    101:600,102:600,103:601,104:601,105:601,106:602,107:602,108:602,109:603,110:603,
    111:603,112:604,113:604,114:604
  };

  function totalAyahs(){ return SURAHS.reduce((a,s)=>a+s.ayahs,0); }
  function memorizedAyahs(){
    return SURAHS.reduce((a,s)=> a + (state.surahs[s.num].status==='memorized' ? s.ayahs : 0), 0);
  }
  const TOTAL_PAGES = 604; // standard Madani Mushaf page count
  function memorizedPages(){
    const covered = new Array(TOTAL_PAGES + 1).fill(false); // index 1..604
    SURAHS.forEach((s, i)=>{
      if(state.surahs[s.num].status !== 'memorized') return;
      const start = PAGE_START[s.num];
      const nextStart = (i + 1 < SURAHS.length) ? PAGE_START[SURAHS[i+1].num] : TOTAL_PAGES + 1;
      for(let p = start; p < nextStart; p++) covered[p] = true;
    });
    return covered.filter(Boolean).length;
  }
  function overallPct(){ return Math.round((memorizedAyahs()/totalAyahs())*1000)/10; }
  function memorizedCount(){ return SURAHS.filter(s=>state.surahs[s.num].status==='memorized').length; }

  function currentStreak(){
    let streak = 0;
    let d = state.checkins[todayStr()] ? 0 : 1; // if today not checked yet, start counting from yesterday
    let cursor = new Date();
    if(!state.checkins[todayStr()]) cursor.setDate(cursor.getDate()-1);
    while(true){
      const key = cursor.getFullYear()+'-'+String(cursor.getMonth()+1).padStart(2,'0')+'-'+String(cursor.getDate()).padStart(2,'0');
      if(state.checkins[key]){
        streak++;
        cursor.setDate(cursor.getDate()-1);
      } else break;
    }
    return streak;
  }

  function isReviewDue(num){
    const rec = state.surahs[num];
    if(rec.status!=='memorized') return false;
    if(!rec.lastReviewed) return true;
    const last = new Date(rec.lastReviewed);
    const diffDays = Math.floor((Date.now()-last.getTime())/86400000);
    return diffDays >= 7; // simple weekly rotation
  }

  function reviewSuggestions(){
    const memorized = SURAHS.filter(s=>state.surahs[s.num].status==='memorized');
    memorized.sort((a,b)=>{
      const la = state.surahs[a.num].lastReviewed || '0000-00-00';
      const lb = state.surahs[b.num].lastReviewed || '0000-00-00';
      return la.localeCompare(lb);
    });
    return memorized.slice(0,5);
  }

  function currentFocusNum(){
    const order = [...PHASE1, ...PHASE2];
    for(const num of order){
      if(state.surahs[num].status!=='memorized') return num;
    }
    return null;
  }

  // ---------- rendering ----------
  function render(){
    const app = document.getElementById('app');
    const pct = overallPct();
    const streak = currentStreak();
    const focusNum = currentFocusNum();
    const suggestions = reviewSuggestions();
    const checkedToday = !!state.checkins[todayStr()];

    let milestoneMsg = '';
    if(pct>=100) milestoneMsg = "You've completed the whole Qur'an — may Allah preserve it for you. الحمد لله";
    else if(pct>=75) milestoneMsg = "Three quarters there. The finish line is close.";
    else if(pct>=50) milestoneMsg = "Halfway through the whole Qur'an — real, tangible progress.";
    else if(pct>=25) milestoneMsg = "A quarter of the way. Momentum is building.";

    app.innerHTML = `
      <header>
        <div class="arabic-sub">رحلة حفظ القرآن</div>
      </header>

      <div class="progress-caption">
        <span>${memorizedAyahs().toLocaleString()} / ${totalAyahs().toLocaleString()} verses</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-num">${pct}%</div>
          <div class="stat-label">Qur'an Memorized</div>
        </div>
        <div class="stat-card streak">
          <div class="stat-num">${streak}</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${memorizedCount()}/114</div>
          <div class="stat-label">Surahs Done</div>
        </div>
      </div>

      ${milestoneMsg ? `<div class="panel" style="border-color:var(--gold);"><span style="color:var(--gold-soft);font-family:'Amiri',serif;font-size:16px;">${milestoneMsg}</span></div>` : ''}

      <div class="panel">
        <h2>Today</h2>
        <div class="checkin-row">
          <button class="btn-gold" id="checkinBtn" ${checkedToday?'disabled':''}>${checkedToday ? "✓ Practiced today" : "Mark today's practice"}</button>
          <span class="checkin-note">${focusNum ? `Currently focused on <strong>${byNum[focusNum].en}</strong> (${byNum[focusNum].ar})` : 'All surahs memorized!'}</span>
        </div>
        <div style="margin-top:16px;">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">Review queue (oldest reviewed first)</div>
          <div class="review-list">
            ${suggestions.length ? suggestions.map(s=>`
              <div class="review-item">
                <span><span class="ar">${s.ar}</span> &nbsp; <span class="en">${s.en}</span></span>
                <button class="btn-ghost" data-review="${s.num}">Reviewed today</button>
              </div>
            `).join('') : '<div class="empty-note">Nothing memorized yet — your first review queue appears once you mark a surah as memorized.</div>'}
          </div>
        </div>
      </div>

      ${renderPhase('من مريم إلى الناس', PHASE1, focusNum)}
      ${renderPhase('من البقرة إلى الكهف', PHASE2, focusNum)}

      <div class="footer-actions">
        <button class="btn-ghost" id="soundBtn">${state.soundEnabled ? '🔊 Sound on' : '🔈 Sound off'}</button>
        <button class="btn-ghost" id="resetBtn">Reset all progress</button>
      </div>
    `;

    document.getElementById('checkinBtn').onclick = doCheckin;
    document.getElementById('resetBtn').onclick = doReset;
    document.getElementById('soundBtn').onclick = toggleSound;
    app.querySelectorAll('[data-review]').forEach(btn=>{
      btn.onclick = ()=> markReviewed(parseInt(btn.getAttribute('data-review')));
    });
    app.querySelectorAll('.bead').forEach(b=>{
      b.onclick = ()=> openModal(parseInt(b.getAttribute('data-num')));
    });
  }

  function renderPhase(title, nums, focusNum){
    const done = nums.filter(n=>state.surahs[n].status==='memorized').length;
    const pct = Math.round((done/nums.length)*100);
    const beads = nums.map(n=>{
      const s = byNum[n];
      const st = state.surahs[n].status;
      const classes = ['bead'];
      if(st==='memorized') classes.push('memorized');
      if(st==='memorizing') classes.push('memorizing');
      if(n===focusNum) classes.push('current');
      if(isReviewDue(n)) classes.push('review-due');
      return `<div class="${classes.join(' ')}" data-num="${n}" title="${s.en} (${s.ayahs} verses)">${n}</div>`;
    }).join('');
    return `
      <div class="phase">
        <div class="phase-head">
          <div class="phase-pct">${done}/${nums.length} · ${pct}%</div>
          <div><span class="phase-title">${title}</span></div>
        </div>
        <div class="bead-grid">${beads}</div>
      </div>
    `;
  }

  function openModal(num){
    currentModalNum = num;
    const s = byNum[num];
    const rec = state.surahs[num];
    const backdrop = document.getElementById('modalBackdrop');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <button class="modal-close" id="modalCloseBtn">×</button>
      <div class="modal-ar">${s.ar}</div>
      <div class="modal-en">${num}. ${s.en}</div>
      <div class="modal-meta">${s.ayahs} verses</div>
      <div class="status-options">
        ${statusOpt('not-started','Not started', rec.status)}
        ${statusOpt('memorizing','Currently memorizing', rec.status)}
        ${statusOpt('memorized','Memorized', rec.status)}
      </div>
      <div class="modal-footer">
        <span class="last-reviewed">${rec.lastReviewed ? 'Last reviewed: '+rec.lastReviewed : 'Not reviewed yet'}</span>
        ${rec.status==='memorized' ? `<button class="btn-gold" id="modalReviewBtn">Mark reviewed today</button>` : ''}
      </div>
    `;
    backdrop.classList.add('open');
    document.getElementById('modalCloseBtn').onclick = closeModal;
    content.querySelectorAll('[data-status]').forEach(el=>{
      el.onclick = ()=> setStatus(num, el.getAttribute('data-status'));
    });
    const reviewBtn = document.getElementById('modalReviewBtn');
    if(reviewBtn) reviewBtn.onclick = ()=> markReviewed(num);
  }

  function statusOpt(value, label, current){
    return `<div class="status-opt ${current===value?'active':''}" data-status="${value}">
      <span class="dot"></span>${label}
    </div>`;
  }

  function closeModal(){
    document.getElementById('modalBackdrop').classList.remove('open');
    currentModalNum = null;
  }

  async function setStatus(num, status){
    const rec = state.surahs[num];
    const pctBefore = overallPct();
    rec.status = status;
    if(status==='memorized' && !rec.memorizedDate){
      rec.memorizedDate = todayStr();
      rec.lastReviewed = todayStr();
    }
    await saveState();
    const pctAfter = overallPct();
    render();
    openModal(num);
    if(status==='memorized'){
      const crossed = crossedMilestone(pctBefore, pctAfter);
      if(crossed){
        playSound('milestone');
        showToast(crossed===100 ? "Qur'an complete — الحمد لله" : `Milestone: ${crossed}% memorized`);
      } else {
        playSound('memorized');
        showToast('Marked as memorized — well done');
      }
    }
    lastKnownPct = pctAfter;
  }

  async function markReviewed(num){
    state.surahs[num].lastReviewed = todayStr();
    await saveState();
    render();
    if(document.getElementById('modalBackdrop').classList.contains('open') && currentModalNum===num){
      openModal(num);
    }
    playSound('review');
    showToast('Review logged');
  }

  async function doCheckin(){
    state.checkins[todayStr()] = true;
    await saveState();
    render();
    playSound('checkin');
    showToast('Streak updated — keep going');
  }

  async function toggleSound(){
    state.soundEnabled = !state.soundEnabled;
    await saveState();
    if(state.soundEnabled) playSound('checkin');
    render();
  }

  async function doReset(){
    if(!confirm('This will erase all your progress. Are you sure?')) return;
    state = defaultState();
    await saveState();
    render();
    showToast('Progress reset');
  }

  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
  }

  document.getElementById('modalBackdrop').addEventListener('click', (e)=>{
    if(e.target.id==='modalBackdrop') closeModal();
  });

  // ---------- init ----------
  (async function init(){
    await loadState();
    lastKnownPct = overallPct();
    render();
  })();
})();
</script>
</body>
</html>
